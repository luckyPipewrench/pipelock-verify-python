name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Extract version from tag
        id: version
        env:
          GH_REF: ${{ github.ref }}
        run: |
          version="${GH_REF#refs/tags/v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure tag matches pyproject version
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib
          import os
          import sys

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = data["project"]["version"]
          tag_version = os.environ["TAG_VERSION"]
          if project_version != tag_version:
              print(
                  f"pyproject.toml version {project_version!r} does not match tag v{tag_version}",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          PY

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pipelock-verify
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
